<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardineros - BOTANIX</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#2d6a4f',
                        naranja: '#e07b2e',
                        azulClaro: '#d8f3dc',
                        verde: '#40916c',
                        oscuro: '#1b4332'
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-gradient-to-br from-[#d8f3dc] via-[#eef8f1] to-white min-h-screen">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('jardineros')"></div>

    <!-- CONTENIDO -->
    <main class="flex-1 p-6 lg:p-10 overflow-hidden">

        <!-- HEADER -->
        <section class="page-header">

            <div>
                <small>👷 Personal de Campo</small>

                <h1>
                    Jardineros
                </h1>

                <p>
                    Gestiona el personal encargado del mantenimiento y cuidado del jardín.
                </p>
            </div>

            <div class="buttons">

                <a th:href="@{/view/jardineros/form}"
                   class="btn-custom btn-principal">
                    👷 Nuevo Jardinero
                </a>

                <a th:href="@{/view/jardineros/pdf}"
                   class="btn-custom btn-naranja">
                    📄 Exportar PDF
                </a>

                <a th:href="@{/view/jardineros/excel}"
                   class="btn-custom btn-verde">
                    📊 Exportar Excel
                </a>

            </div>

        </section>

        <!-- ALERTA -->
        <div th:if="${message}"
             class="alert-success-custom"
             th:text="${message}">
        </div>

        <!-- TABLA -->
        <section class="card-table">

            <!-- HEADER TABLA -->
            <div class="card-table-header">

                <div>
                    <h2>
                        👷 Personal Registrado
                    </h2>
                    <p>
                        Directorio de jardineros y sus roles en el sistema.
                    </p>
                </div>

                <!-- BUSCADOR -->
                <div class="search-box">
                    <input type="text"
                           id="searchInput"
                           placeholder="Buscar jardinero...">
                    <span>🔍</span>
                </div>

            </div>

            <!-- CONTENEDOR -->
            <div class="table-container">

                <table class="custom-table">

                    <thead>
                    <tr>
                        <th>⚙️</th>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Dirección</th>
                        <th>Rol</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="jardinero : ${jardineros}">

                        <td>
                            <div class="actions">

                                <a th:href="@{'/view/jardineros/edit/' + ${jardinero.id_jardinero}}"
                                   class="btn-action btn-edit">
                                    ✏️
                                </a>

                                <form th:action="@{'/view/jardineros/delete/' + ${jardinero.id_jardinero}}"
                                      method="post">
                                    <button type="submit"
                                            class="btn-action btn-delete"
                                            onclick="return confirm('¿Está seguro que desea eliminar este jardinero?')">
                                        🗑️
                                    </button>
                                </form>

                            </div>
                        </td>

                        <td class="text-id" th:text="${jardinero.id_jardinero}"></td>
                        <td><strong th:text="${jardinero.nombre}"></strong></td>
                        <td th:text="${jardinero.documento}"></td>
                        <td th:text="${jardinero.direccion}"></td>
                        <td>
                            <span class="badge-rol" th:text="${jardinero.rol}"></span>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>

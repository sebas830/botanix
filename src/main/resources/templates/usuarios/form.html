<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Usuario - BOTANIX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#2d6a4f',
                        naranja: '#e07b2e',
                        azulClaro: '#d8f3dc',
                        verde: '#40916c',
                        oscuro: '#1b4332'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-[#d8f3dc] via-[#eef8f1] to-white min-h-screen">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('usuarios')"></div>

    <!-- CONTENIDO -->
    <main class="flex-1 p-6 lg:p-10">

        <!-- HEADER -->
        <section class="page-header">

            <div>
                <small>👥 Acceso al Sistema</small>

                <h1 th:text="${usuarios.id_usuarios == null} ? 'Registrar Usuario' : 'Editar Usuario'">
                    Registrar Usuario
                </h1>

                <p>
                    Completa la información del usuario para registrarlo o actualizar sus datos.
                </p>
            </div>

            <div class="buttons">
                <a th:href="@{/view/usuarios}" class="btn-custom btn-verde">
                    ← Volver
                </a>
            </div>

        </section>

        <!-- FORMULARIO -->
        <section class="bg-white rounded-[30px] shadow-xl overflow-hidden">

            <div class="bg-[#1b4332] px-8 py-6">
                <h2 class="text-2xl font-bold text-white">
                    👤 Datos del Usuario
                </h2>
                <p class="text-[#d8f3dc] mt-1">
                    Los campos marcados son necesarios para guardar la información.
                </p>
            </div>

            <form th:action="@{/view/usuarios/save}"
                  th:object="${usuarios}"
                  method="post"
                  novalidate
                  class="p-8">

                <input type="hidden" th:field="*{id_usuarios}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Nombre -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Nombre Completo
                        </label>
                        <input type="text"
                               th:field="*{nombre}"
                               required
                               placeholder="Ingrese el nombre completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Tipo Documento -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Tipo de Documento
                        </label>
                        <input type="text"
                               th:field="*{tipo_documento}"
                               required
                               placeholder="CC, TI, CE..."
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Documento -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Número de Documento
                        </label>
                        <input type="text"
                               th:field="*{documento}"
                               required
                               placeholder="Número de documento"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Teléfono -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Teléfono
                        </label>
                        <input type="text"
                               th:field="*{telefono}"
                               required
                               placeholder="Número de contacto"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Correo -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Correo Electrónico
                        </label>
                        <input type="email"
                               th:field="*{correo}"
                               required
                               placeholder="correo@ejemplo.com"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Dirección -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Dirección
                        </label>
                        <input type="text"
                               th:field="*{direccion}"
                               required
                               placeholder="Dirección de residencia"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Contraseña
                        </label>
                        <input type="password"
                               th:field="*{contrasena}"
                               required
                               placeholder="Ingrese una contraseña segura"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Fecha nacimiento -->
                    <div>
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Fecha de Nacimiento
                        </label>
                        <input type="date"
                               th:field="*{fecha_nacimiento}"
                               required
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20">
                    </div>

                    <!-- Observaciones -->
                    <div class="md:col-span-2">
                        <label class="block mb-2 font-bold text-[#1b4332]">
                            Observaciones
                        </label>
                        <textarea th:field="*{observaciones}"
                                  rows="4"
                                  required
                                  placeholder="Escriba observaciones adicionales"
                                  class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#2d6a4f] focus:ring-4 focus:ring-[#2d6a4f]/20"></textarea>
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-gray-100">

                    <a th:href="@{/view/usuarios}"
                       class="btn-custom btn-verde justify-center">
                        ← Volver
                    </a>

                    <button type="submit"
                            class="btn-custom btn-principal justify-center">
                        💾 Guardar Usuario
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
